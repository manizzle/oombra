# nur — production deploy using pre-built image from GitHub Container Registry
#
# Usage:
#   curl -sSL https://raw.githubusercontent.com/manizzle/nur/main/docker-compose.prod.yml -o docker-compose.yml
#   curl -sSL https://raw.githubusercontent.com/manizzle/nur/main/.env.example -o .env
#   curl -sSL https://raw.githubusercontent.com/manizzle/nur/main/Caddyfile -o Caddyfile
#   # Edit .env with your settings
#   docker compose up -d

services:
  nur:
    image: ghcr.io/manizzle/nur:latest
    ports:
      - "${NUR_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - NUR_DB_URL=postgresql+asyncpg://nur:${POSTGRES_PASSWORD:-nur}@postgres:5432/nur
      - NUR_API_KEY=${NUR_API_KEY:-}
      - NUR_MIN_K=${NUR_MIN_K:-3}
      - NUR_AUTO_INGEST=1
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - PULSEDIVE_API_KEY=${PULSEDIVE_API_KEY:-}
      - OTX_API_KEY=${OTX_API_KEY:-}
      - GREYNOISE_API_KEY=${GREYNOISE_API_KEY:-}
      - HYBRID_ANALYSIS_API_KEY=${HYBRID_ANALYSIS_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nur
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nur}
      POSTGRES_DB: nur
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nur"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NUR_DOMAIN=${NUR_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
    depends_on:
      - nur
    restart: unless-stopped

volumes:
  pg-data:
  caddy-data:
