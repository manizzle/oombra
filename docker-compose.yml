# nur — collective security intelligence
#
# Quick start (dev):
#   docker compose up
#
# Production (PostgreSQL + auto-ingest + API key):
#   docker compose --profile production up -d
#
# Full stack with Caddy reverse proxy (HTTPS):
#   docker compose --profile production --profile web up -d

services:
  # ── Dev mode: SQLite, no auth ────────────────────────────────
  nur:
    build: .
    ports:
      - "${NUR_PORT:-8000}:8000"
    environment:
      - NUR_DB_URL=${NUR_DB_URL:-sqlite+aiosqlite:///data/nur.db}
      - NUR_API_KEY=${NUR_API_KEY:-}
      - NUR_MIN_K=${NUR_MIN_K:-3}
      - NUR_AUTO_INGEST=${NUR_AUTO_INGEST:-0}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - PULSEDIVE_API_KEY=${PULSEDIVE_API_KEY:-}
      - OTX_API_KEY=${OTX_API_KEY:-}
      - GREYNOISE_API_KEY=${GREYNOISE_API_KEY:-}
      - HYBRID_ANALYSIS_API_KEY=${HYBRID_ANALYSIS_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - nur-data:/app/data
    restart: unless-stopped

  # ── Production: PostgreSQL + auto-ingest ─────────────────────
  nur-prod:
    build: .
    ports:
      - "${NUR_PORT:-8000}:8000"
    environment:
      - NUR_DB_URL=postgresql+asyncpg://nur:${POSTGRES_PASSWORD:-nur}@postgres:5432/nur
      - NUR_API_KEY=${NUR_API_KEY:-}
      - NUR_MIN_K=${NUR_MIN_K:-3}
      - NUR_AUTO_INGEST=1
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - PULSEDIVE_API_KEY=${PULSEDIVE_API_KEY:-}
      - OTX_API_KEY=${OTX_API_KEY:-}
      - GREYNOISE_API_KEY=${GREYNOISE_API_KEY:-}
      - HYBRID_ANALYSIS_API_KEY=${HYBRID_ANALYSIS_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - production

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nur
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nur}
      POSTGRES_DB: nur
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nur"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - production

  # ── Caddy reverse proxy (HTTPS + domain) ─────────────────────
  # NUR_UPSTREAM must match the production service name above
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NUR_DOMAIN=${NUR_DOMAIN:-localhost}
      - NUR_UPSTREAM=nur-prod:8000
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - nur-prod
    restart: unless-stopped
    profiles:
      - web

volumes:
  nur-data:
  pg-data:
  caddy-data:
  caddy-config:
