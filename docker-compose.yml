# vigil — deployable threat intel sharing stack
#
# Quick start:
#   docker compose up
#
# Production (PostgreSQL):
#   docker compose --profile production up
#
# With live feed ingestion:
#   VIGIL_AUTO_INGEST=1 docker compose up
#
# With API key auth:
#   VIGIL_API_KEY=your-secret docker compose up

services:
  vigil:
    build: .
    ports:
      - "${VIGIL_PORT:-8000}:8000"
    environment:
      - VIGIL_DB_URL=${VIGIL_DB_URL:-sqlite+aiosqlite:///data/vigil.db}
      - VIGIL_API_KEY=${VIGIL_API_KEY:-}
      - VIGIL_MIN_K=${VIGIL_MIN_K:-3}
      - VIGIL_AUTO_INGEST=${VIGIL_AUTO_INGEST:-0}
    volumes:
      - vigil-data:/app/data
    restart: unless-stopped

  # ── Production: PostgreSQL backend ────────────────────────────
  vigil-prod:
    build: .
    ports:
      - "${VIGIL_PORT:-8000}:8000"
    environment:
      - VIGIL_DB_URL=postgresql+asyncpg://vigil:${POSTGRES_PASSWORD:-vigil}@postgres:5432/vigil
      - VIGIL_API_KEY=${VIGIL_API_KEY:-}
      - VIGIL_MIN_K=${VIGIL_MIN_K:-3}
      - VIGIL_AUTO_INGEST=${VIGIL_AUTO_INGEST:-1}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - production

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vigil}
      POSTGRES_DB: vigil
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigil"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - production

volumes:
  vigil-data:
  pg-data:
