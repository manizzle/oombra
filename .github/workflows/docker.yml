name: Build & Push & Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.sha }}
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/admin/nur

            # Save current image digest for rollback
            PREV_IMAGE=$(docker inspect --format='{{.Image}}' nur-nur-1 2>/dev/null || echo "")
            echo "Previous image: $PREV_IMAGE"

            # Pull and deploy new image
            docker compose pull nur
            docker compose up -d nur
            echo "Waiting 90s for app startup..."
            sleep 90
            docker restart nur-caddy-1
            sleep 15

            # Verify health
            HEALTHY=false
            for i in 1 2 3 4 5; do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:80/health || echo "000")
              if [ "$HTTP" = "200" ] || [ "$HTTP" = "308" ]; then
                echo "Deploy verified: HTTP $HTTP"
                HEALTHY=true
                break
              fi
              echo "Attempt $i: HTTP $HTTP, waiting..."
              sleep 10
            done

            # Rollback if unhealthy
            if [ "$HEALTHY" = "false" ]; then
              echo "ERROR: Deploy health check failed!"
              if [ -n "$PREV_IMAGE" ]; then
                echo "Rolling back to previous image..."
                docker compose down nur
                docker compose up -d nur
                sleep 30
                docker restart nur-caddy-1
                echo "Rollback attempted. Check manually."
              fi
              exit 1
            fi
            # ── Guards ──────────────────────────────────────────────────────
            if ! grep -q '^NUR_DOMAIN=' .env 2>/dev/null; then
              echo "FATAL: NUR_DOMAIN not set in .env — refusing to deploy (would break SSL)"
              exit 1
            fi
            DOMAIN=$(grep '^NUR_DOMAIN=' .env | cut -d= -f2)
            echo "NUR_DOMAIN=$DOMAIN"
            TARGET_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            echo "TARGET_IMAGE=$TARGET_IMAGE"

            # ── Save current image for rollback ─────────────────────────────
            PREV_IMAGE=$(docker inspect --format='{{index .RepoDigests 0}}' nur-nur-prod-1 2>/dev/null || true)
            if [ -z "$PREV_IMAGE" ] || [ "$PREV_IMAGE" = "<no value>" ]; then
              PREV_IMAGE=$(docker inspect --format='{{.Config.Image}}' nur-nur-prod-1 2>/dev/null || echo "")
            fi
            if [ -n "$PREV_IMAGE" ]; then
              echo "Saved rollback image: $PREV_IMAGE"
            else
              echo "No previous container found (first deploy or container removed)"
            fi

            # ── Helpers ─────────────────────────────────────────────────────
            check_backend() {
              local label="$1" attempts="${2:-20}"
              for i in $(seq 1 "$attempts"); do
                HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8000/health 2>/dev/null || echo "000")
                if [ "$HTTP" = "200" ]; then
                  echo "$label backend healthy (attempt $i/$attempts)"
                  return 0
                fi
                echo "$label backend (attempt $i/$attempts): HTTP $HTTP"
                sleep 5
              done
              return 1
            }

            check_public_pages() {
              local base_url="$1" label="$2" curl_flags="${3:-}"
              local contribute_page
              contribute_page=$(mktemp)
              if curl $curl_flags -fsS --max-time 10 "${base_url}/contribute" -o "$contribute_page" \
                && grep -q "Submit voice eval" "$contribute_page"; then
                echo "$label contribute page healthy"
                return 0
              fi
              echo "$label contribute page check failed"
              return 1
            }

            check_https() {
              local label="$1" attempts="${2:-5}"
              for i in $(seq 1 "$attempts"); do
                HTTP=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 "https://${DOMAIN}/health" 2>/dev/null || echo "000")
                if [ "$HTTP" = "200" ]; then
                  echo "$label HTTPS healthy (attempt $i/$attempts)"
                  return 0
                fi
                echo "$label HTTPS (attempt $i/$attempts): HTTP $HTTP"
                sleep 5
              done
              return 1
            }

            # Full end-to-end: backend + HTTPS must both pass
            verify_site() {
              local label="$1"
              check_backend "$label" "${2:-20}" \
                && check_public_pages "http://localhost:8000" "$label backend" \
                && check_https "$label" "${3:-5}" \
                && check_public_pages "https://${DOMAIN}" "$label https" "-k"
            }

            dump_logs() {
              echo ""
              echo "--- docker compose ps ---"
              docker compose ps -a
              echo ""
              echo "--- nur-prod logs (last 100) ---"
              docker compose logs --tail=100 nur-prod 2>&1 || true
              echo ""
              echo "--- postgres logs (last 50) ---"
              docker compose logs --tail=50 postgres 2>&1 || true
              echo ""
              echo "--- caddy logs (last 50) ---"
              docker compose logs --tail=50 caddy 2>&1 || true
            }

            rollback() {
              if [ -z "$PREV_IMAGE" ]; then
                echo "CRITICAL: No previous image to roll back to — site is down"
                dump_logs
                return 1
              fi
              echo ""
              echo "╔══════════════════════════════════════════╗"
              echo "║  ROLLING BACK to: $PREV_IMAGE"
              echo "╚══════════════════════════════════════════╝"
              echo ""
              NUR_IMAGE="$PREV_IMAGE" docker compose pull nur-prod || true
              NUR_IMAGE="$PREV_IMAGE" docker compose up -d --no-deps nur-prod

              if verify_site "Rollback" 10 5; then
                echo ""
                echo "Rollback succeeded — site is back on previous version"
                return 0
              else
                echo ""
                echo "CRITICAL: Rollback ALSO failed — site is down"
                dump_logs
                return 1
              fi
            }

            # ── Sync config files from repo (never touch .env) ──────────────
            curl -sSL https://raw.githubusercontent.com/manizzle/nur/main/docker-compose.prod.yml -o docker-compose.yml
            curl -sSL https://raw.githubusercontent.com/manizzle/nur/main/Caddyfile -o Caddyfile

            # ── Ensure infra is running (no-op if already up) ───────────────
            docker compose up -d postgres caddy

            # ── Deploy the app ──────────────────────────────────────────────
            NUR_IMAGE="$TARGET_IMAGE" docker compose pull nur-prod
            NUR_IMAGE="$TARGET_IMAGE" docker compose up -d --no-deps nur-prod
            echo "Waiting for app startup..."

            # ── Verify end-to-end: backend + HTTPS ──────────────────────────
            if verify_site "Deploy" 20 5; then
              echo ""
              echo "══════════════════════════════════════"
              echo "  Deploy verified — site is healthy"
              echo "══════════════════════════════════════"
              exit 0
            fi

            # ── Deploy failed — capture logs BEFORE rollback destroys them ──
            echo ""
            echo "=========================================="
            echo "DEPLOY FAILED — capturing diagnostic logs"
            echo "=========================================="
            dump_logs

            # ── Rollback and verify ─────────────────────────────────────────
            if rollback; then
              echo ""
              echo "Site restored to previous version. Deploy failed."
              exit 1
            fi

            echo ""
            echo "=========================================="
            echo "CRITICAL: Site is DOWN — manual intervention required"
            echo "=========================================="
            exit 1
