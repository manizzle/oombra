name: Build & Push & Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/admin/nur

            # Guard: ensure NUR_DOMAIN is set (prevents SSL regression)
            if ! grep -q '^NUR_DOMAIN=' .env 2>/dev/null; then
              echo "FATAL: NUR_DOMAIN not set in .env — refusing to deploy (would break SSL)"
              exit 1
            fi
            DOMAIN=$(grep '^NUR_DOMAIN=' .env | cut -d= -f2)
            echo "NUR_DOMAIN=$DOMAIN"

            # ── Save current image for rollback ──────────────────────────────
            PREV_IMAGE=$(docker inspect --format='{{.Config.Image}}' nur-nur-prod-1 2>/dev/null || echo "")
            if [ -n "$PREV_IMAGE" ]; then
              echo "Saved rollback image: $PREV_IMAGE"
            else
              echo "No previous container found (first deploy or container removed)"
            fi

            # ── Helper: check backend health ─────────────────────────────────
            check_backend() {
              local label="$1"
              local attempts="${2:-20}"
              for i in $(seq 1 $attempts); do
                HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8000/health || echo "000")
                if [ "$HTTP" = "200" ]; then
                  echo "$label healthy: HTTP $HTTP"
                  return 0
                fi
                echo "$label (attempt $i/$attempts): HTTP $HTTP"
                sleep 5
              done
              return 1
            }

            # ── Helper: dump diagnostic logs ─────────────────────────────────
            dump_logs() {
              echo ""
              echo "--- docker compose ps ---"
              docker compose ps -a
              echo ""
              echo "--- nur-prod container logs (last 100 lines) ---"
              docker compose logs --tail=100 nur-prod
              echo ""
              echo "--- postgres container logs (last 50 lines) ---"
              docker compose logs --tail=50 postgres
              echo ""
              echo "--- caddy container logs (last 50 lines) ---"
              docker compose logs --tail=50 caddy
            }

            # ── Helper: rollback to previous image ───────────────────────────
            rollback() {
              if [ -z "$PREV_IMAGE" ]; then
                echo "No previous image to roll back to — site will remain down"
                return 1
              fi
              echo ""
              echo "╔══════════════════════════════════════════╗"
              echo "║  ROLLING BACK to: $PREV_IMAGE"
              echo "╚══════════════════════════════════════════╝"
              echo ""

              # Pin compose to the previous image instead of :latest
              NUR_IMAGE="$PREV_IMAGE" docker compose up -d --no-deps nur-prod

              if check_backend "Rollback" 10; then
                echo "Rollback succeeded — site is back on previous version"
                return 0
              else
                echo "Rollback ALSO failed — site is down, manual intervention needed"
                dump_logs
                return 1
              fi
            }

            # ── Sync config files from repo (never touch .env) ───────────────
            curl -sSL https://raw.githubusercontent.com/manizzle/nur/main/docker-compose.prod.yml -o docker-compose.yml
            curl -sSL https://raw.githubusercontent.com/manizzle/nur/main/Caddyfile -o Caddyfile

            # ── Deploy new image ─────────────────────────────────────────────
            docker compose pull nur-prod
            docker compose up -d --remove-orphans
            echo "Waiting for app startup..."

            # ── Health check: backend ────────────────────────────────────────
            if ! check_backend "Backend" 20; then
              echo ""
              echo "=========================================="
              echo "DEPLOY FAILED: Backend never became healthy"
              echo "=========================================="
              dump_logs
              rollback
              exit 1
            fi

            # ── Health check: HTTPS ──────────────────────────────────────────
            HTTPS_OK=false
            for i in 1 2 3 4 5; do
              HTTP=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 "https://${DOMAIN}/health" || echo "000")
              if [ "$HTTP" = "200" ]; then
                echo "Deploy verified via HTTPS: HTTP $HTTP"
                HTTPS_OK=true
                break
              fi
              echo "HTTPS check attempt $i: HTTP $HTTP, waiting..."
              sleep 5
            done

            if [ "$HTTPS_OK" = "false" ]; then
              echo ""
              echo "=========================================="
              echo "DEPLOY FAILED: HTTPS health check failed"
              echo "=========================================="
              echo ""
              echo "--- caddy container logs (last 100 lines) ---"
              docker compose logs --tail=100 caddy
              rollback
              exit 1
            fi

            echo ""
            echo "══════════════════════════════════════"
            echo "  Deploy successful"
            echo "══════════════════════════════════════"
