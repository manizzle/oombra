name: Build & Push & Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/admin/nur

            # Guard: ensure NUR_DOMAIN is set (prevents SSL regression)
            if ! grep -q '^NUR_DOMAIN=' .env 2>/dev/null; then
              echo "FATAL: NUR_DOMAIN not set in .env — refusing to deploy (would break SSL)"
              exit 1
            fi
            echo "NUR_DOMAIN=$(grep '^NUR_DOMAIN=' .env | cut -d= -f2)"

            # Sync config files from repo (compose, Caddyfile) — never touch .env
            curl -sSL https://raw.githubusercontent.com/manizzle/nur/main/docker-compose.prod.yml -o docker-compose.yml
            curl -sSL https://raw.githubusercontent.com/manizzle/nur/main/Caddyfile -o Caddyfile

            # Pull new image and restart all services (remove orphaned old containers)
            docker compose pull nur-prod
            docker compose up -d --remove-orphans
            echo "Waiting for app startup..."

            # Verify backend health directly (not through Caddy redirect)
            for i in $(seq 1 20); do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8000/health || echo "000")
              if [ "$HTTP" = "200" ]; then
                echo "Backend healthy: HTTP $HTTP"
                break
              fi
              echo "Waiting for backend (attempt $i): HTTP $HTTP"
              sleep 5
            done

            # Verify HTTPS is working (not just HTTP through Caddy)
            DOMAIN=$(grep '^NUR_DOMAIN=' .env | cut -d= -f2)
            for i in 1 2 3 4 5; do
              HTTP=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 "https://${DOMAIN}/health" || echo "000")
              if [ "$HTTP" = "200" ]; then
                echo "Deploy verified via HTTPS: HTTP $HTTP"
                exit 0
              fi
              echo "HTTPS check attempt $i: HTTP $HTTP, waiting..."
              sleep 5
            done
            echo "WARNING: HTTPS may not be healthy yet — check Caddy logs"
